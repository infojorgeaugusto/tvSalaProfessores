<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Escolar - EEB Jorge Augusto</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; 
            min-height: 100vh; width: 100vw;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364) fixed;
            color: white; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden;
            zoom: 0.72; 
            cursor: pointer;
        }

        /* --- ANIMAÇÕES --- */
        @keyframes flutuar { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        @keyframes entrada { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes rolagemVertical { 0% { transform: translateY(0); } 100% { transform: translateY(-100%); } }

        /* --- ESTRUTURA FIXA --- */
        #topoEsquerdo { position: absolute; top: 15px; left: 30px; display: flex; align-items: center; gap: 15px; z-index: 100; }
        #logoEscola { height: 85px; } 
        #nomeEscola { font-size: 28px; font-weight: bold; } 
        #dataHora { position: absolute; top: 15px; right: 30px; font-size: 15px; font-weight: bold; text-align: right; z-index: 100; }
        #climaBox { position: absolute; top: 75px; right: 30px; background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 12px; z-index: 100; }
        #clima { font-size: 19px; font-weight: bold; display: flex; align-items: center; gap: 8px; }

        /* --- SISTEMA DE TELAS --- */
        .tela {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            padding: 115px 40px 40px 40px; 
            box-sizing: border-box; display: none; flex-direction: column; align-items: center;
        }
        .tela.ativa { display: flex; animation: entrada 0.5s ease-out; }
        h1 { font-size: 32px; margin-bottom: 18px; text-transform: uppercase; color: #00ffcc; text-align: center; } 

        /* --- AGENDAMENTOS SEMANAIS (AJUSTADO PARA USAR A TELA TODA) --- */
        #lista { width: 100%; height: 72vh; overflow: hidden; position: relative; } 
        .container-scroll { 
            position: absolute;
            width: 100%;
            animation: rolagemVertical 80s linear infinite; 
        }
        .container-scroll:hover { animation-play-state: paused; }

        .separador-dia {
            background-color: #444; color: #ffcc00; font-weight: bold; text-transform: uppercase;
            padding: 12px 18px; border-radius: 8px; font-size: 20px; margin-bottom: 12px; width: 100%; box-sizing: border-box;
        } 

        .evento { 
            background: rgba(255,255,255,0.1); padding: 16px; margin-bottom: 12px; 
            border-radius: 10px; border-left: 8px solid #00ffcc; width: 100%; box-sizing: border-box; 
        }
        .evento.hoje { border-left-color: #00ff00; background: rgba(45, 56, 45, 0.6); }

        .linha-cabecalho { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .titulo-evento { font-size: 21px; font-weight: bold; color: #fff; } 
        .horario-evento { font-size: 18px; font-weight: bold; color: #00ccff; }

        .detalhes-agendamento { display: flex; flex-wrap: wrap; gap: 18px; font-size: 16px; color: #ccc; } 
        .detalhe-item b { color: #00ffcc; }

        /* --- AVISOS --- */
        #avisos { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .aviso { 
            background: #ffcc00; color: black; padding: 20px 25px; border-radius: 12px; 
            font-size: 22px; font-weight: bold; width: 100%; box-sizing: border-box; margin-bottom: 15px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        } 
        .aviso strong { font-size: 25px; display: block; border-bottom: 2px solid rgba(0,0,0,0.1); margin-bottom: 6px; }

        /* --- DICAS --- */
        #conteudoDicas { width: 100%; display: flex; justify-content: center; }
        .dica-item {
            background: rgba(255, 255, 255, 0.08); padding: 25px; border-radius: 15px; 
            font-size: 22px; line-height: 1.4; width: 100%; box-sizing: border-box; text-align: center;
            border: 2px solid #00ffcc; display: none;
        } 
        .dica-item.ativa { display: block; }
        .dica-item strong { font-size: 26px; color: #00ffcc; display: block; margin-bottom: 12px; }

        /* --- PREVISÃO DO TEMPO --- */
        .container-previsao { width: 100%; display: flex; flex-direction: column; gap: 18px; }
        .header-previsao { 
            display: flex; justify-content: space-around; align-items: center; 
            background: rgba(0,0,0,0.4); padding: 18px; border-radius: 15px; border: 2px solid rgba(255,255,255,0.1); width: 100%; box-sizing: border-box;
        }
        .temp-principal { font-size: 70px; font-weight: bold; display: flex; align-items: center; gap: 12px; } 
        .detalhes-clima { display: flex; gap: 35px; text-align: center; font-size: 16px; }
        .detalhe-valor { font-weight: bold; color: #00ffcc; font-size: 25px; }
        
        .grafico-temp { 
            background: rgba(0,0,0,0.4); padding: 18px; border-radius: 15px; height: 150px; 
            display: flex; justify-content: space-around; align-items: flex-end; width: 100%; box-sizing: border-box;
        }
        .barra-hora { display: flex; flex-direction: column; align-items: center; flex: 1; }
        .barra { width: 26px; background: #00ffcc; border-radius: 8px 8px 0 0; transition: height 0.5s; }
        .barra-temp { font-size: 16px; font-weight: bold; margin-bottom: 5px; }

        /* --- MIDIA / SLIDESHOW --- */
        #slideshow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 5; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: contain; background-position: center; background-repeat: no-repeat; opacity: 0; transition: opacity 1.5s; }
        .slide.ativa { opacity: 1; }

        /* --- ANIVERSÁRIO (AJUSTADO PARA DISTRIBUIR MELHOR) --- */
        .tela-aniversario { 
            background: linear-gradient(135deg, #2b5876, #4e4376); 
            padding-top: 50px !important; 
            justify-content: center !important; 
        }
        .foto-aniversariante { width: 220px; height: 220px; border-radius: 50%; border: 6px solid white; object-fit: cover; }

        .oculto { display: none !important; }
    </style>
</head>
<body onclick="solicitarTelaCheia()">

    <div id="topoEsquerdo">
        <img src="https://i.ibb.co/6cMHwnvr/Jorge-Sem-Fundo.png" id="logoEscola">
        <div id="nomeEscola">EEB JORGE AUGUSTO</div>
    </div>
    <div id="dataHora"></div>
    <div id="climaBox"><div id="clima">...</div></div>

    <div id="telaBoasVindas" class="tela ativa">
        <div style="font-size: 42px; color: #00ffcc; animation: flutuar 3s infinite ease-in-out; font-family: 'Montserrat';">BEM-VINDOS À EEB JORGE AUGUSTO</div>
        <img src="https://i.ibb.co/6cMHwnvr/Jorge-Sem-Fundo.png" style="height:280px; margin-top:15px;">
    </div>

    <div id="telaAgenda" class="tela">
        <h1>AGENDAMENTOS DA SEMANA (LAB TECH)</h1>
        <div id="lista">
            <div class="container-scroll" id="containerScroll"></div>
        </div>
    </div>

    <div id="telaAvisos" class="tela">
        <h1>AVISOS IMPORTANTES</h1>
        <div id="avisos"></div>
    </div>

    <div id="telaDicas" class="tela">
        <h1>DICA DO DIA</h1>
        <div id="conteudoDicas"></div>
    </div>

    <div id="telaPrevisao" class="tela">
        <h1>PREVISÃO PARA AMANHÃ</h1>
        <div class="container-previsao" id="previsaoBox"></div>
    </div>

    <div id="telaMidia" class="tela">
        <div id="slideshow"></div>
    </div>

    <div id="telaAniversario" class="tela tela-aniversario">
        <canvas id="confettiCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas>
        <h1 style="color:white; z-index:2; margin-bottom: 40px;">🎂 FELIZ ANIVERSÁRIO! 🎂</h1>
        <div id="listaAniversariantes" style="display:flex; justify-content:center; gap:60px; z-index:2; flex-wrap:wrap; align-items:center;"></div>
    </div>

    <div id="relOpcional" style="position:fixed; top:0; left:0; width:100%; height:100%; background:red; z-index:9999; display:none; flex-direction:column; justify-content:center; align-items:center;">
        <h1 style="color:white; font-size:50px">PAUSA FINALIZADA</h1>
        <div id="relOpcionalConteudo" style="font-size:100px; color:white; font-weight:bold"></div>
        <audio id="alarmeAudio" loop><source src="https://raw.githubusercontent.com/infofranciscomanfroi/drive/main/sirene.mp3"></audio>
    </div>

<script>
const BASE_URL = "https://script.google.com/macros/s/AKfycbwU9AeiOaIA1N34-_yQnwAHmSrUM_4kWrk5IDNTNeJHzXg8Zz5w2DNMBi5-Q0xwNBu6/exec";

let telaAtual = 0;
const telas = ["telaBoasVindas", "telaAgenda", "telaAvisos", "telaDicas", "telaPrevisao", "telaMidia", "telaAniversario"];
let listaDicas = [];
let dicaIdx = 0;
let listaAniversariantes = [];

const slidesSrc = [
    "https://i.ibb.co/vxGD0yy4/01.jpg", "https://i.ibb.co/yFp8sJdm/02.jpg",
    "https://i.ibb.co/1tPgSQ4R/05.jpg", "https://i.ibb.co/WWCqVdGd/04.jpg", "https://i.ibb.co/s0rSG23/03.jpg"
];

function solicitarTelaCheia() {
    const elem = document.documentElement;
    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}

function dispararConfetes() {
    const canvas = document.getElementById('confettiCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    let particles = [];
    const colors = ['#f44336','#e91e63','#9c27b0','#673ab7','#3f51b5','#2196f3','#03a9f4','#00bcd4','#009688','#4caf50','#8bc34a','#cddc39','#ffeb3b','#ffc107','#ff9800','#ff5722'];

    for (let i = 0; i < 150; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height - canvas.height,
            size: Math.random() * 8 + 4,
            color: colors[Math.floor(Math.random() * colors.length)],
            speed: Math.random() * 3 + 2,
            angle: Math.random() * 6.28
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
            ctx.fill();
            p.y += p.speed;
            p.x += Math.sin(p.angle) * 1;
            if (p.y > canvas.height) p.y = -10;
        });

        if (document.getElementById('telaAniversario').classList.contains('ativa')) {
            requestAnimationFrame(draw);
        }
    }
    draw();
}

function carregarDados() {
    fetch(BASE_URL + "?tipo=clima").then(r=>r.json()).then(d=>{
        document.getElementById("clima").innerHTML = `${d.temperatura}°C <img src="https://openweathermap.org/img/wn/${d.icone}.png" style="height:40px">`;
    });

    fetch(BASE_URL).then(r=>r.json()).then(data=>{
        let htmlPrincipal = "";
        const hojeObj = new Date();
        const hojeStr = hojeObj.toLocaleDateString("pt-BR");
        let ultimoDia = "";

        data.slice(1).forEach(e => {
            const dados = {};
            if (e[3]) {
                e[3].split("\n").forEach(l => {
                    const partes = l.split(":");
                    if (partes.length >= 2) dados[partes[0].trim().toLowerCase()] = partes.slice(1).join(":").trim();
                });
            }

            const inicio = new Date(e[1]);
            const fim = new Date(e[2]);
            const dataEventoStr = inicio.toLocaleDateString("pt-BR");
            const diaFormatado = inicio.toLocaleDateString("pt-BR", { weekday: 'long', day: '2-digit', month: '2-digit' });

            if (diaFormatado !== ultimoDia) {
                htmlPrincipal += `<div class="separador-dia">${diaFormatado}</div>`;
                ultimoDia = diaFormatado;
            }

            const classeHoje = (dataEventoStr === hojeStr) ? "hoje" : "";
            const numAulas = dados["quantidade"] || (dados["aulas"] ? dados["aulas"].split(",").length : "-");

            htmlPrincipal += `
                <div class="evento ${classeHoje}">
                    <div class="linha-cabecalho">
                        <div class="titulo-evento">${e[0]}</div>
                        <div class="horario-evento">${inicio.toLocaleTimeString("pt-BR", {hour:'2-digit', minute:'2-digit'})} - ${fim.toLocaleTimeString("pt-BR", {hour:'2-digit', minute:'2-digit'})}</div>
                    </div>
                    <div class="detalhes-agendamento">
                        <div class="detalhe-item">👤 <b>Prof:</b> ${dados["professor"] || "-"}</div>
                        <div class="detalhe-item">📚 <b>Ano:</b> ${dados["ano"] || "-"}</div>
                        <div class="detalhe-item">⏰ <b>Turno:</b> ${dados["período"] || "-"}</div>
                        <div class="detalhe-item">📐 <b>Aulas:</b> ${numAulas}</div>
                    </div>
                </div>
            `;
        });

        if(htmlPrincipal === "") htmlPrincipal = `<div class="separador-dia">Nenhum agendamento para esta semana.</div>`;

        document.getElementById("containerScroll").innerHTML = htmlPrincipal + htmlPrincipal; 
    });

    fetch(BASE_URL + "?tipo=avisos").then(r=>r.json()).then(data=>{
        let html = "";
        data.slice(1).forEach(row => {
            html += `<div class="aviso"><strong>${row[0]}</strong>${row[1]}</div>`;
        });
        document.getElementById("avisos").innerHTML = html || "Sem novos avisos.";
    });

    fetch(BASE_URL + "?tipo=dicas").then(r=>r.json()).then(data=>{
        listaDicas = data.slice(1);
        let h = "";
        listaDicas.forEach((d, i) => h += `<div class="dica-item" id="dica_${i}"><strong>${d[0]}</strong>${d[1]}</div>`);
        document.getElementById("conteudoDicas").innerHTML = h;
    });

    fetch(BASE_URL + "?tipo=aniversariantes").then(r=>r.json()).then(data=>{
        listaAniversariantes = data;
        let html = "";
        data.forEach(p => html += `
            <div style="text-align:center">
                <img src="${p.foto}" class="foto-aniversariante" onerror="this.src='https://i.ibb.co/C0L501F/avatar-padrao.png'">
                <br>
                <span style="font-size:24px; font-weight:bold; color: white; display: block; margin-top: 15px;">${p.nome}</span>
            </div>
        `);
        document.getElementById("listaAniversariantes").innerHTML = html || `<h2 style="color: #fff; z-index:2;">Nenhum aniversariante hoje!</h2>`;
    });

    fetch(BASE_URL + "?tipo=previsaoAmanha").then(r=>r.json()).then(d=>{
        let html = `
            <div class="header-previsao">
                <div class="temp-principal">
                    <img src="https://openweathermap.org/img/wn/${d.icone}@4x.png" style="height:100px">
                    <div>${d.temperatura}°C</div>
                </div>
                <div class="detalhes-clima">
                    <div>Máx/Mín<br><span class="detalhe-valor">${d.maxima}°/${d.minima}°</span></div>
                    <div>Umidade<br><span class="detalhe-valor">${d.umidade}%</span></div>
                    <div>Vento<br><span class="detalhe-valor">${d.vento}km/h</span></div>
                </div>
            </div>
            <div class="grafico-temp" id="graficoBarras"></div>`;
        document.getElementById("previsaoBox").innerHTML = html;
        if(d.grafico) {
            const container = document.getElementById("graficoBarras");
            const temps = d.grafico.map(p => p.temp);
            const minT = Math.min(...temps), maxT = Math.max(...temps), range = maxT - minT;
            d.grafico.forEach(p => {
                const alt = range === 0 ? 80 : ((p.temp - minT) / range) * 100 + 10;
                container.innerHTML += `<div class="barra-hora"><span class="barra-temp">${p.temp}°</span><div class="barra" style="height:${alt}px"></div><span style="font-size:14px; font-weight:bold; margin-top:5px;">${p.hora}h</span></div>`;
            });
        }
    });
}

function trocarTela() {
    telas.forEach(id => document.getElementById(id).classList.remove("ativa"));
    let id = telas[telaAtual];

    if(id === "telaAniversario" && listaAniversariantes.length === 0) {
        telaAtual = (telaAtual + 1) % telas.length;
        trocarTela(); return;
    }

    document.getElementById(id).classList.add("ativa");

    if (id === "telaAniversario") {
        dispararConfetes();
    }
    
    const fixos = (id === "telaMidia" || id === "telaBoasVindas" || id === "telaAniversario");
    document.getElementById("topoEsquerdo").classList.toggle("oculto", fixos);
    document.getElementById("dataHora").classList.toggle("oculto", fixos);
    document.getElementById("climaBox").classList.toggle("oculto", fixos);

    if(id === "telaDicas") {
        document.querySelectorAll('.dica-item').forEach(d => d.classList.remove('ativa'));
        const el = document.getElementById(`dica_${dicaIdx}`);
        if(el) el.classList.add('ativa');
        dicaIdx = (dicaIdx + 1) % listaDicas.length;
    }

    telaAtual = (telaAtual + 1) % telas.length;
    setTimeout(trocarTela, 25000); 
}

function iniciarSlideshow() {
    const container = document.getElementById("slideshow");
    slidesSrc.forEach((src, i) => {
        let s = document.createElement("div");
        s.className = "slide" + (i===0?" ativa":"");
        s.style.backgroundImage = `url(${src})`;
        container.appendChild(s);
    });
    let idx = 0;
    setInterval(() => {
        const ss = document.querySelectorAll(".slide");
        ss[idx].classList.remove("ativa");
        idx = (idx + 1) % ss.length;
        ss[idx].classList.add("ativa");
    }, 5000);
}

setInterval(() => {
    const agora = new Date();
    document.getElementById("dataHora").innerHTML = agora.toLocaleDateString('pt-BR', {weekday:'long', day:'2-digit', month:'long'}) + "<br>" + agora.toLocaleTimeString('pt-BR');
    
    const h = agora.getHours(), m = agora.getMinutes(), s = agora.getSeconds();
    const pausas = [[9,30], [10,0], [15,15], [15,30], [16,0], [20,0]];
    if(pausas.some(p => p[0] === h && p[1] === m) && s === 0) {
        const box = document.getElementById("relOpcional");
        box.style.display = "flex";
        document.getElementById("alarmeAudio").play();
        setTimeout(() => { box.style.display = "none"; }, 300000);
    }
    document.getElementById("relOpcionalConteudo").innerText = agora.toLocaleTimeString();
}, 1000);

carregarDados();
iniciarSlideshow();
setTimeout(trocarTela, 2000);
</script>
</body>
</html>
